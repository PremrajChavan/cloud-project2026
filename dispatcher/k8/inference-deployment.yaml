apiVersion: apps/v1
kind: Deployment
metadata:
  name: tu-cloud-project
  labels:
    app: resnet-infer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resnet-infer
  template:
    metadata:
      labels:
        app: resnet-infer
    spec:
      containers:
        - name: resnet-infer
          image: resnet-infer
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6001
            - containerPort: 8001
          resources:
            requests:
              cpu: "1"        # ← FIXED (was "500m")
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"